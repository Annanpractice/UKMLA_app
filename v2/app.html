<body>
  <div class="app-intro" id="app-intro" aria-label="UKMLA opening animation">
    <button class="app-intro-launch" id="app-intro-launch" type="button" aria-label="Play the UKMLA introduction and enter the site">
      <img src="./assets/ukmla-intro-first-frame.jpg?v=4" alt="" aria-hidden="true">
      <span class="app-intro-prompt">Tap to enter</span>
    </button>
    <video class="app-intro-video" id="app-intro-video" src="./assets/ukmla-intro.mp4?v=6" preload="auto" playsinline></video>
  </div>

    <aside class="side-nav" aria-label="Primary navigation">

      </div>
      <nav id="desktop-nav"></nav>
      <div class="sync-indicator" id="sync-indicator">Local-first</div>
    </aside>

    <header class="top-bar">

      <button class="icon-button" id="quick-search" aria-label="Search">⌕</button>
    </header>

    <main id="app" tabindex="-1">
      <section class="loading-screen">
        <div class="loader-orbit"></div>
        <h1>Loading card atlas</h1>
        <p>Preparing the condition index without loading the old PDF.</p>
      </section>
    </main>

    <nav class="bottom-nav" id="mobile-nav" aria-label="Primary navigation"></nav>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
