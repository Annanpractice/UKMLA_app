<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>UKMLA App</title><style>html,body{margin:0;width:100%;height:100%;background:#18263c;color:#fff;font-family:system-ui,sans-serif}iframe{display:block;width:100%;height:100%;border:0;background:#18263c}.boot{position:fixed;inset:0;display:grid;place-items:center;background:#18263c;z-index:10}.boot-card{max-width:320px;padding:24px;text-align:center}.boot h1{font-size:20px;margin:0 0 10px}.boot p{margin:0;opacity:.82}.boot button{margin-top:16px;padding:10px 14px;border:0;border-radius:12px;font-weight:700}.hidden{display:none}</style></head><body><div id="boot" class="boot"><div class="boot-card"><h1>Loading UKMLA app…</h1><p id="bootmsg">Opening the revision encyclopedia.</p><button id="retry" class="hidden" type="button">Reload</button></div></div><iframe id="ukmla" src="index.html?v=17" title="UKMLA revision app"></iframe><script>(function(){var frame=document.getElementById('ukmla'),boot=document.getElementById('boot'),msg=document.getElementById('bootmsg'),retry=document.getElementById('retry');retry.onclick=function(){location.reload()};var files=['ui-shell.js?v=17','quiz-export.js?v=17','ui-polish.js?v=12','ai-error-report.js?v=3','ai-generation-rules.js?v=2','ai-api-stream.js?v=8','ai-option-normalizer.js?v=10','ai-generation-status.js?v=9','ai-score-summary.js?v=7'];var done=false;function fail(text){msg.textContent=text;retry.classList.remove('hidden');setTimeout(function(){boot.classList.add('hidden')},5000)}function load(d,i){if(i>=files.length){done=true;msg.textContent='Ready.';setTimeout(function(){boot.classList.add('hidden')},150);return}msg.textContent='Loading '+files[i].split('?')[0]+'…';var s=d.createElement('script'),settled=false,t=setTimeout(function(){if(settled)return;settled=true;console.error('Timed out loading',files[i]);load(d,i+1)},6000);s.src=files[i];s.onload=function(){if(settled)return;settled=true;clearTimeout(t);load(d,i+1)};s.onerror=function(){if(settled)return;settled=true;clearTimeout(t);console.error('Failed to load',files[i]);load(d,i+1)};d.head.appendChild(s)}frame.addEventListener('load',function(){try{var d=frame.contentDocument;if(!d||!d.head){fail('The encyclopedia loaded, but its document could not be enhanced.');return}msg.textContent='Encyclopedia opened. Loading quiz tools…';setTimeout(function(){boot.classList.add('hidden')},400);load(d,0)}catch(e){fail('The encyclopedia opened, but the quiz tools could not be loaded.')}});frame.addEventListener('error',function(){fail('The main app page could not be loaded.')} );setTimeout(function(){if(!done&&boot&&!boot.classList.contains('hidden')){msg.textContent='Still loading. The encyclopedia should appear underneath shortly.';retry.classList.remove('hidden')}},12000)})();</script></body></html>
