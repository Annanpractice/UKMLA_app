name: Apply generated-set survival patch

on:
  push:
    branches:
      - "agent/fix-unsaved-generated-sets-v2"
    paths:
      - ".github/workflows/apply-generated-set-survival.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-unsaved-generated-sets-v2
          fetch-depth: 0
      - name: Apply storage survival changes
        run: python scripts/apply_generated_set_survival_patch.py
      - name: Validate patched runtime
        run: |
          node --check v2/question-bank.js
          node --check v2/ai-engine.js
          node --check v2/ai-save-recovery.js
          node scripts/validate_generated_set_survival.js
      - name: Commit patched runtime
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v2/question-bank.js v2/ai-engine.js
          git commit -m "Keep generated sets through index quota failures"
          git push origin HEAD:agent/fix-unsaved-generated-sets-v2
