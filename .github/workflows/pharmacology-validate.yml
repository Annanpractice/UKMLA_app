name: Validate clinical pharmacology module

on:
  pull_request:
    branches: ["main"]
    paths:
      - "v2/pharmacology-data.js"
      - "v2/pharmacology-data-*.js"
      - "v2/pharmacology-ai.js"
      - "v2/pharmacology.js"
      - "v2/app.html"
      - "service-worker.js"
      - "scripts/validate_pharmacology_module.js"
      - "data_sources/CLINICAL_PHARMACOLOGY_RESEARCH.md"
      - ".github/workflows/pharmacology-validate.yml"
  push:
    branches: ["main"]
    paths:
      - "v2/pharmacology-data.js"
      - "v2/pharmacology-data-*.js"
      - "v2/pharmacology-ai.js"
      - "v2/pharmacology.js"
      - "v2/app.html"
      - "service-worker.js"
      - "scripts/validate_pharmacology_module.js"
      - "data_sources/CLINICAL_PHARMACOLOGY_RESEARCH.md"
      - ".github/workflows/pharmacology-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          node --check v2/pharmacology-data.js
          for FILE in v2/pharmacology-data-*.js; do node --check "$FILE"; done
          node --check v2/pharmacology-ai.js
          node --check v2/pharmacology.js
          node --check scripts/validate_pharmacology_module.js
          node --check service-worker.js

      - name: Validate cards, calculations and integration
        run: node scripts/validate_pharmacology_module.js

      - name: Confirm deployed module references
        run: |
          grep -q 'pharmacology-data.js?v=1' v2/app.html
          grep -q 'pharmacology-ai.js?v=1' v2/app.html
          grep -q 'pharmacology.js?v=1' v2/app.html
          grep -q 'pharmacology-data.js' service-worker.js
          for FILE in v2/pharmacology-data-*.js; do grep -q "$(basename "$FILE")" v2/app.html; grep -q "$(basename "$FILE")" service-worker.js; done
          grep -q 'pharmacology-ai.js' service-worker.js
          grep -q 'pharmacology.js' service-worker.js
