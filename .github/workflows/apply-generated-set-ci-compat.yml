name: Apply generated-set CI compatibility patch

on:
  push:
    branches:
      - "agent/fix-unsaved-generated-sets-v2"
    paths:
      - ".github/workflows/apply-generated-set-ci-compat.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-unsaved-generated-sets-v2
          fetch-depth: 0
      - name: Apply IndexedDB fallback patch
        run: python scripts/apply_generated_set_ci_compat.py
      - name: Validate patched engine
        run: |
          node --check v2/ai-engine.js
          node scripts/validate_combined_pipeline.js
          node scripts/validate_generated_set_survival.js
      - name: Commit patched engine
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v2/ai-engine.js
          git commit -m "Retain completed sets when IndexedDB is unavailable"
          git push origin HEAD:agent/fix-unsaved-generated-sets-v2
