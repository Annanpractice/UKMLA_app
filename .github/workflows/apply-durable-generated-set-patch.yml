name: Apply durable generated-set patch

on:
  push:
    branches:
      - "agent/durable-generated-question-storage"
  pull_request_target:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/durable-generated-question-storage
          fetch-depth: 0
      - name: Apply durable generated-set patch
        run: python scripts/apply_durable_generated_set_patch.py
      - name: Commit patched runtime files
        run: |
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v2/ai-engine.js v2/ai-save-recovery.js v2/app.html service-worker.js scripts/validate_question_bank.js scripts/validate_recency_background.js scripts/validate_durable_generated_sets.js
          if git diff --cached --quiet; then
            echo "Runtime patch already applied"
            exit 0
          fi
          git commit -m "Keep completed generated sets until verified storage"
          git push origin HEAD:agent/durable-generated-question-storage
