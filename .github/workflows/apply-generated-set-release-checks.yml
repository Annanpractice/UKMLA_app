name: Apply generated-set release checks

on:
  push:
    branches:
      - "agent/fix-unsaved-generated-sets-v2"
    paths:
      - ".github/workflows/apply-generated-set-release-checks.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-unsaved-generated-sets-v2
          fetch-depth: 0
      - name: Update release checks
        run: python scripts/apply_generated_set_release_checks.py
      - name: Commit release checks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/pages.yml
          git commit -m "Validate generated-set survival release"
          git push origin HEAD:agent/fix-unsaved-generated-sets-v2
