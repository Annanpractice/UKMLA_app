name: Extract original intro first frame

on:
  push:
    branches: [agent/restore-original-intro-media]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-frame:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/restore-original-intro-media
          fetch-depth: 0

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Extract first frame from original video
        run: |
          ffmpeg -y -i assets/ukmla-intro.mp4 -frames:v 1 -q:v 2 assets/ukmla-intro-first-frame.jpg
          test -s assets/ukmla-intro-first-frame.jpg
          python - <<'PY'
          from pathlib import Path
          data = Path('assets/ukmla-intro-first-frame.jpg').read_bytes()
          marker = data.find(b'\xff\xc0')
          if marker < 0:
              raise SystemExit('JPEG dimensions unavailable')
          height = int.from_bytes(data[marker+5:marker+7], 'big')
          width = int.from_bytes(data[marker+7:marker+9], 'big')
          assert (width, height) == (1280, 720), (width, height)
          print(f'Extracted {width}x{height} first frame')
          PY

      - name: Commit extracted frame
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ukmla-intro-first-frame.jpg
          if git diff --cached --quiet; then
            echo "First frame already matches the original video."
          else
            git commit -m "Extract high-resolution first frame from original intro"
            git push origin HEAD:agent/restore-original-intro-media
          fi
