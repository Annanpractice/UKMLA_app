name: Prepare silent original intro

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'agent/original-silent-intro'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout intro branch
        uses: actions/checkout@v4
        with:
          ref: agent/original-silent-intro
          fetch-depth: 0

      - name: Install media tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Remove audio without re-encoding video and extract first frame
        run: |
          set -euo pipefail
          ffmpeg -hide_banner -loglevel error -y \
            -i assets/ukmla-intro.mp4 \
            -map 0:v:0 -c:v copy -an -movflags +faststart \
            assets/ukmla-intro.silent.mp4
          mv assets/ukmla-intro.silent.mp4 assets/ukmla-intro.mp4
          ffmpeg -hide_banner -loglevel error -y \
            -i assets/ukmla-intro.mp4 \
            -vf "select=eq(n\,0)" -frames:v 1 -q:v 1 \
            assets/ukmla-intro-first-frame.jpg

      - name: Verify original resolution and no audio stream
        run: |
          set -euo pipefail
          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of csv=p=0 assets/ukmla-intro.mp4)
          HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 assets/ukmla-intro.mp4)
          AUDIO_STREAMS=$(ffprobe -v error -select_streams a -show_entries stream=index -of csv=p=0 assets/ukmla-intro.mp4 | wc -l)
          test "$WIDTH" = "1280"
          test "$HEIGHT" = "720"
          test "$AUDIO_STREAMS" = "0"
          test -s assets/ukmla-intro-first-frame.jpg
          echo "Verified ${WIDTH}x${HEIGHT}, audio streams: ${AUDIO_STREAMS}"

      - name: Commit final media and remove one-off workflow
        run: |
          set -euo pipefail
          rm .github/workflows/silent-original-intro.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ukmla-intro.mp4 assets/ukmla-intro-first-frame.jpg .github/workflows/silent-original-intro.yml
          git commit -m "Use original-resolution silent intro and extracted first frame"
          git push origin HEAD:agent/original-silent-intro
