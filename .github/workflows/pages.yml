name: Validate and deploy UKMLA Cards

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JavaScript and extractor
        run: |
          node --check v2/core.js
          node --check v2/ai-transport.js
          node --check v2/ai-schema.js
          node --check v2/ai-engine.js
          node --check v2/ai-ui.js
          node --check v2/knowledge-pptx.js
          node --check v2/knowledge.js
          node --check v2/firebase-config.js
          node --check v2/sync.js
          python -m py_compile scripts/build_v2_data.py

      - name: Extract and audit all condition cards
        run: |
          python scripts/build_v2_data.py
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('data/conditions.json').read_text(encoding='utf-8'))
          conditions = data['conditions']
          ids = [item['id'] for item in conditions]

          print(f"Extracted conditions: {data['conditionCount']}")
          print(f"Extracted topics: {data['topicCount']}")
          print(f"Clinical cards: {sum(item['profile'] == 'clinical' for item in conditions)}")
          print(f"Law cards: {sum(item['profile'] == 'law' for item in conditions)}")

          assert data['conditionCount'] >= 480
          assert len(conditions) == data['conditionCount']
          assert len(ids) == len(set(ids))
          assert all(item.get('id') and item.get('topicId') and item.get('name') for item in conditions)
          assert all(len(item.get('fields', {})) >= 3 for item in conditions)
          assert any(item['profile'] == 'law' for item in conditions)
          PY

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Extract condition dataset
        run: python scripts/build_v2_data.py

      - name: Prepare lightweight routed app
        run: |
          rm -rf _site
          mkdir -p _site/v2 _site/data
          cp v2/app.html _site/index.html
          cp v2/*.css v2/*.js _site/v2/
          cp data/conditions.json _site/data/conditions.json

          cat > _site/app.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Opening UKMLA Cards</title>
          <script>location.replace('./#/home');</script>
          <p><a href="./#/home">Open UKMLA Cards</a></p>
          HTML

          test -s _site/index.html
          test -s _site/data/conditions.json
          test -s _site/v2/core.js
          ! grep -q 'original-pdf-data' _site/index.html
          ! grep -q '<iframe' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
