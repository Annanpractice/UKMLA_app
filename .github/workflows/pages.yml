name: Validate and deploy UKMLA Cards

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JavaScript and Python syntax
        id: syntax
        shell: bash
        run: |
          set +e
          : > validation-diagnostics.txt
          STATUS=0

          for FILE in \
            v2/core.js \
            v2/ai-transport.js \
            v2/ai-schema.js \
            v2/biomedical-ai.js \
            v2/ai-engine.js \
            v2/ai-ui.js \
            v2/biomedical.js \
            v2/biomedical-basic.js \
            v2/question-workspace.js \
            v2/knowledge-pptx.js \
            v2/knowledge.js \
            v2/firebase-config.js \
            v2/sync.js \
            v2/psa-schema.js \
            v2/psa-engine.js \
            v2/psa-grounding.js \
            v2/psa-runtime.js \
            v2/psa.js \
            scripts/validate_psa_module.js \
            scripts/validate_question_concision.js
          do
            echo "=== ${FILE} ===" >> validation-diagnostics.txt
            node --check "${FILE}" >> validation-diagnostics.txt 2>&1
            CODE=$?
            if [ ${CODE} -ne 0 ]; then STATUS=${CODE}; fi
          done

          for FILE in \
            scripts/build_v2_data.py \
            scripts/biomedical_core.py \
            scripts/normalise_v2_data.py \
            scripts/validate_biomedical_module.py
          do
            echo "=== ${FILE} ===" >> validation-diagnostics.txt
            python -m py_compile "${FILE}" >> validation-diagnostics.txt 2>&1
            CODE=$?
            if [ ${CODE} -ne 0 ]; then STATUS=${CODE}; fi
          done

          cat validation-diagnostics.txt
          exit ${STATUS}

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: validation-diagnostics.txt
          if-no-files-found: error

      - name: Validate PSA blueprint, source grounding and calculations
        run: node scripts/validate_psa_module.js

      - name: Validate sparse stems and concise answer checkpoints
        run: node scripts/validate_question_concision.js

      - name: Validate biomedical sources, question integration and generated data
        run: python scripts/validate_biomedical_module.py

      - name: Validate Basic HTML profile isolation
        run: |
          grep -q "\['anatomy','physiology'\].includes(item.profile)" v2/biomedical-basic.js
          grep -q "questions.length!==10" v2/biomedical-basic.js
          grep -q "biomedical-basic.js" v2/app.html

      - name: Validate mobile UKMLA Questions workspace
        run: |
          grep -q "ai:'UKMLA Questions'" v2/question-workspace.js
          grep -q "window.UKMLA_V2_AI.mount(container)" v2/question-workspace.js
          grep -q "api.App.state.quizTab=tab" v2/question-workspace.js
          grep -q "GMC content-map practice" v2/question-workspace.js
          grep -q "BNF/NICE-grounded" v2/question-workspace.js
          grep -q "Temporary OpenAI API key" v2/ai-ui.js
          grep -q "inputmode=\"text\"" v2/ai-ui.js
          grep -q "Session only" v2/ai-ui.js
          grep -q "Build 10 UKMLA questions" v2/ai-ui.js
          ! grep -q "AI-generated UKMLA quiz" v2/ai-ui.js
          ! grep -q "Generate 10-question AI quiz" v2/ai-ui.js
          grep -q "question-workspace.css" v2/app.html
          grep -q "question-workspace.js" v2/app.html
          python - <<'PY'
          from pathlib import Path
          html = Path('v2/app.html').read_text(encoding='utf-8')
          assert html.index('biomedical-basic.js') < html.index('question-workspace.js')
          assert 'ai-schema.js?v=2' in html
          assert 'biomedical-ai.js?v=2' in html
          assert 'ai-engine.js?v=2' in html
          assert 'ai-ui.js?v=2' in html
          PY

      - name: Audit complete card dataset
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('data/conditions.json').read_text(encoding='utf-8'))
          conditions = data['conditions']
          ids = [item['id'] for item in conditions]
          topics = {item['name']: item['count'] for item in data['topics']}
          profiles = {}
          for item in conditions:
              profiles[item['profile']] = profiles.get(item['profile'], 0) + 1

          print(f"Extracted cards: {data['conditionCount']}")
          print(f"Extracted topics: {data['topicCount']}")
          print(f"Profiles: {profiles}")

          assert data['conditionCount'] == 813
          assert data['topicCount'] == 25
          assert len(conditions) == data['conditionCount']
          assert len(ids) == len(set(ids))
          assert profiles == {
              'anatomy': 139,
              'clinical': 415,
              'law': 69,
              'physiology': 190,
          }
          assert topics['Clinical Anatomy'] == 139
          assert topics['Clinical Physiology'] == 190
          assert all(item.get('id') and item.get('topicId') and item.get('name') for item in conditions)
          assert all(len(item.get('fields', {})) >= 3 for item in conditions)
          assert all(len(item['fields']) == 5 for item in conditions if item['profile'] in {'anatomy', 'physiology'})
          assert not any(name.lower().endswith(' heading') for name in topics)
          PY

      - name: Upload extracted card dataset
        uses: actions/upload-artifact@v4
        with:
          name: extracted-card-data
          path: data/conditions.json
          if-no-files-found: error

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Extract complete condition dataset
        run: |
          python scripts/build_v2_data.py
          python scripts/normalise_v2_data.py

      - name: Prepare lightweight routed app
        run: |
          rm -rf _site
          mkdir -p _site/v2 _site/data
          cp v2/app.html _site/index.html
          cp v2/*.css v2/*.js _site/v2/
          cp data/conditions.json _site/data/conditions.json

          cat > _site/app.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Opening UKMLA Cards</title>
          <script>location.replace('./#/home');</script>
          <p><a href="./#/home">Open UKMLA Cards</a></p>
          HTML

          test -s _site/index.html
          test -s _site/data/conditions.json
          test -s _site/v2/core.js
          test -s _site/v2/ai-schema.js
          test -s _site/v2/ai-engine.js
          test -s _site/v2/ai-ui.js
          test -s _site/v2/biomedical.js
          test -s _site/v2/biomedical-ai.js
          test -s _site/v2/biomedical-basic.js
          test -s _site/v2/biomedical.css
          test -s _site/v2/question-workspace.js
          test -s _site/v2/question-workspace.css
          test -s _site/v2/psa.js
          test -s _site/v2/psa-grounding.js
          test -s _site/v2/psa-grounding.css
          test -s _site/v2/psa-runtime.js
          test -s _site/v2/psa.css
          grep -q 'biomedical-ai.js' _site/index.html
          grep -q 'biomedical.js' _site/index.html
          grep -q 'biomedical-basic.js' _site/index.html
          grep -q 'biomedical.css' _site/index.html
          grep -q 'question-workspace.js' _site/index.html
          grep -q 'question-workspace.css' _site/index.html
          grep -q 'ai-schema.js?v=2' _site/index.html
          grep -q 'biomedical-ai.js?v=2' _site/index.html
          grep -q 'ai-engine.js?v=2' _site/index.html
          grep -q 'ai-ui.js?v=2' _site/index.html
          grep -q 'psa-grounding.js' _site/index.html
          grep -q 'psa-grounding.css' _site/index.html
          python - <<'PY'
          import json
          data = json.load(open('_site/data/conditions.json', encoding='utf-8'))
          assert data['conditionCount'] == 813
          assert data['topicCount'] == 25
          PY
          ! grep -q 'original-pdf-data' _site/index.html
          ! grep -q '<iframe' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
