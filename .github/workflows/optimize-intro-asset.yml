name: Optimise intro asset

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  optimise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-fake-poster-optimize-intro
          fetch-depth: 0
      - name: Inspect source media
        run: |
          ls -lh assets/ukmla-intro.mp4
          file assets/ukmla-intro.mp4
          ffprobe -v error -show_entries format=duration,size -show_entries stream=codec_name,width,height,pix_fmt -of default=noprint_wrappers=1 assets/ukmla-intro.mp4
      - name: Create mobile MP4 and genuine poster frame
        run: |
          ffmpeg -hide_banner -loglevel error -y -i assets/ukmla-intro.mp4 \
            -vf "scale=720:-2:flags=lanczos,fps=24" \
            -c:v libx264 -preset medium -crf 24 -pix_fmt yuv420p -movflags +faststart \
            -c:a aac -b:a 80k \
            assets/ukmla-intro.optimised.mp4
          ffmpeg -hide_banner -loglevel error -y -ss 0.12 -i assets/ukmla-intro.optimised.mp4 \
            -frames:v 1 -update 1 -q:v 3 assets/ukmla-intro-first-frame.jpg
          mv assets/ukmla-intro.optimised.mp4 assets/ukmla-intro.mp4
          ls -lh assets/ukmla-intro.mp4 assets/ukmla-intro-first-frame.jpg
      - name: Commit optimised media
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ukmla-intro.mp4 assets/ukmla-intro-first-frame.jpg
          git commit -m "Optimise mobile intro media" || exit 0
          git push origin HEAD:agent/remove-fake-poster-optimize-intro
