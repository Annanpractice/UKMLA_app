name: Apply shared quiz status and intro

on:
  push:
    branches:
      - "agent/shared-quiz-status-intro"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/shared-quiz-status-intro
          fetch-depth: 0
      - name: Apply interface patch
        id: apply
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('scripts/apply_shared_status_intro.py')
          text=path.read_text(encoding='utf-8')
          old="updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)"
          new="updated, count = re.subn(pattern, lambda _match: replacement, text, count=1, flags=re.S)"
          if old in text:
              path.write_text(text.replace(old,new,1),encoding='utf-8')
          PY
          set +e
          python scripts/apply_shared_status_intro.py > shared-status-patch.log 2>&1
          CODE=$?
          cat shared-status-patch.log
          echo "code=${CODE}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit patch or diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.apply.outputs.code }}" != "0" ]; then
            git restore v2/ai-ui.js v2/question-bank.js v2/question-workspace.js v2/app.html service-worker.js
            git add scripts/apply_shared_status_intro.py shared-status-patch.log
            git commit -m "Record shared status patch mismatch"
            git push origin HEAD:agent/shared-quiz-status-intro
            exit 1
          fi
          rm -f shared-status-patch.log
          git add -A
          if git diff --cached --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git commit -m "Share quiz progress with background generation"
          git push origin HEAD:agent/shared-quiz-status-intro
